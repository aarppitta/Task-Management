services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: daily_task_manager
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build: ./server
    restart: unless-stopped
    ports:
      - "3001:3000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 3000
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: daily_task_manager
      DB_USER: postgres
      DB_PASSWORD: root
      CLIENT_URL: http://localhost:4173
      MAILTRAP_HOST: sandbox.smtp.mailtrap.io
      MAILTRAP_PORT: 2525
      MAILTRAP_USER: ${MAILTRAP_USER:-}
      MAILTRAP_PASS: ${MAILTRAP_PASS:-}
      MAILTRAP_FROM: noreply@dailytaskmanager.com
      NOTIFY_EMAIL: ${NOTIFY_EMAIL:-}

  client:
    build:
      context: ./client
      args:
        VITE_API_URL: http://localhost:3001/api
    restart: unless-stopped
    ports:
      - "4173:4173"
    depends_on:
      - server

volumes:
  pgdata:
