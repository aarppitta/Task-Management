services:

  # ── PostgreSQL ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: taskmanager_db
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Kolkata}
      POSTGRES_DB: daily_task_manager
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d daily_task_manager"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ── Backend (Node/Express) ──────────────────────────────────
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: taskmanager_server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./server/.env
    environment:
      TZ: ${TZ:-Asia/Kolkata}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: daily_task_manager
      DB_USER: postgres
      DB_PASSWORD: root
      CORS_ORIGIN: http://localhost:3000,http://localhost:5001
    ports:
      - "5001:5000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Frontend (React → Nginx) ────────────────────────────────
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:5001/api
    container_name: taskmanager_client
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Kolkata}
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "3000:80"

volumes:
  postgres_data:
